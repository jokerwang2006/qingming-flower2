name: Update Flower Count
on:
  repository_dispatch:
    types: [add-flower]
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update issue comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: 1  # 改成你的 Issue 编号
          body: |
            ${{ github.event.client_payload.count }}
