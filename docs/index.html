<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>清明献花</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f5f5;
            text-align: center;
            padding-top: 100px;
        }

        .flower-box {
            display: inline-block;
            margin-top: 30px;
        }

        /* 未献花样式 */
        #flowerBtn {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #e63946;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3;
        }

        #flowerBtn:hover:not(.disabled) {
            background-color: #c1121f;
        }

        /* 已献花样式 */
        #flowerBtn.disabled {
            background-color: #999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h2>清明追思 · 致敬先烈与故人</h2>
    <div class="flower-box">
        <button id="flowerBtn">点击献花</button>
    </div>

    <script>
        // 获取按钮元素
        const btn = document.getElementById('flowerBtn');

        // 一打开页面就检查是否已经献过花
        window.onload = function() {
            if(localStorage.getItem('hasFlower') === 'true') {
                setFlowered();
            }
        };

        // 点击献花
        btn.onclick = function() {
            // 如果已经献过，直接返回，不执行
            if(localStorage.getItem('hasFlower') === 'true') {
                return;
            }

            // 标记为已献花
            localStorage.setItem('hasFlower', 'true');
            setFlowered();
        };

        // 设置按钮为“已献花”状态
        function setFlowered() {
            btn.innerText = '已献花';
            btn.classList.add('disabled');
        }
    </script>
</body>
</html>
