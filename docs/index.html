<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>清明献花</title>
    <style>
        body {
            text-align: center;
            background: #f7f7f7;
            padding: 50px 0;
            font-family: "Microsoft YaHei";
        }
        .box {
            background: white;
            width: 340px;
            margin: 0 auto;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 26px;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }
        /* 花朵永久显示 */
        .flower {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 15 L55 35 L75 40 L58 55 L65 75 L50 65 L35 75 L42 55 L25 40 L45 35 Z" fill="pink"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        #text {
            font-size: 22px;
            margin-bottom: 20px;
        }
        #btn {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #btn.disabled {
            background: #999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="title">清明寄思·云端献花</div>
        <div class="desc">缅怀先烈 文明祭扫</div>
        <div class="flower"></div>
        <div id="text">点击献花</div>
        <button id="btn">献花</button>
    </div>

    <script>
        let btn = document.getElementById('btn');
        let text = document.getElementById('text');

        // 打开页面就检查是否献过花
        if(localStorage.getItem('done') === '1'){
            showDone();
        }

        // 点击事件
        btn.onclick = function(){
            if(localStorage.getItem('done') === '1') return;
            localStorage.setItem('done', '1');
            showDone();
        }

        // 显示已献花状态
        function showDone(){
            text.innerText = '已献花';
            btn.innerText = '已献花';
            btn.classList.add('disabled');
        }
    </script>
</body>
</html>
