<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>清明·云端献花</title>
<style>
body{text-align:center;background:#f2f2f2;font-family:"微软雅黑";padding:20px 15px;}
.box{max-width:600px;margin:0 auto;background:#fff;padding:35px 25px;border-radius:16px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
h1{font-size:28px;color:#333;margin-bottom:15px;}
.sub{font-size:18px;color:#666;margin-bottom:40px;}
.flower{font-size:90px;cursor:pointer;transition:.3;margin:20px 0;}
.flower:hover{transform:scale(1.1);}
#tip{font-size:20px;margin:15px 0;}
.btn{padding:18px 35px;background:#27ae60;color:#fff;border:none;border-radius:12px;font-size:20px;cursor:pointer;width:80%;}
.btn:hover{background:#219653;}
.btn.done{background:#999;cursor:not-allowed;}
</style>
</head>
<body>
<div class="box">
<h1>清明寄思 · 云端献花</h1>
<p class="sub">缅怀先烈 · 文明祭扫 · 绿色清明</p >
<div class="flower" onclick="add()">🌸</div>
<p id="tip">点击鲜花，献上缅怀</p>
<button class="btn" id="flowerBtn" onclick="add()">我要献花</button>
</div>
<script>
window.onload = function(){
    if(localStorage.getItem('hasFlower') === '1'){
        showDone();
    }
}

function add(){
    if(localStorage.getItem('hasFlower') === '1'){
        return;
    }
    localStorage.setItem('hasFlower', '1');
    showDone();
    alert("献花成功！缅怀先烈，传承精神。");
}

function showDone(){
    document.getElementById("tip").innerText = "已献花";
    let btn = document.getElementById("flowerBtn");
    btn.innerText = "已献花";
    btn.classList.add("done");
}
</script>
</body>
</html>
