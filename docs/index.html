<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 只加了这一行 手机适配 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清明·云端献花</title>
<style>
body{text-align:center;background:#f2f2f2;font-family:"微软雅黑";padding:40px 20px;}
.box{max-width:600px;margin:0 auto;background:#fff;padding:40px;border-radius:16px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
h1{font-size:24px;color:#333;margin-bottom:10px;}
.sub{color:#666;margin-bottom:30px;}
.flower{font-size:70px;cursor:pointer;transition:.3;}
.flower:hover{transform:scale(1.1);}
.btn{padding:12px 30px;background:#27ae60;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.btn:hover{background:#219653;}
.btn.done{background:#999;cursor:not-allowed;}
</style>
</head>
<body>
<div class="box">
<h1>清明寄思 · 云端献花</h1>
<p class="sub">缅怀先烈 · 文明祭扫 · 绿色清明</p >
<div class="flower" onclick="add()">🌸</div>
<p id="tip">点击鲜花，献上缅怀</p>
<button class="btn" id="flowerBtn" onclick="add()">我要献花</button>
</div>
<script>
window.onload = function(){
    if(localStorage.getItem('hasFlower') === '1'){
        showDone();
    }
}

function add(){
    if(localStorage.getItem('hasFlower') === '1'){
        return;
    }
    localStorage.setItem('hasFlower', '1');
    showDone();
    alert("献花成功！缅怀先烈，传承精神。");
}

function showDone(){
    document.getElementById("tip").innerText = "已献花";
    let btn = document.getElementById("flowerBtn");
    btn.innerText = "已献花";
    btn.classList.add("done");
}
</script>
</body>
</html>
