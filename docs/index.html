<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清明献花</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#f7f7f7;
font-family:Arial,sans-serif;
text-align:center;
padding:30px 15px;
}
.card{
background:white;
padding:30px 20px;
border-radius:20px;
max-width:400px;
margin:0 auto;
box-shadow:0 0 15px #00000010
}
h1{
font-size:22px;
margin-bottom:10px;
color:#333
}
.text{
color:#666;
margin-bottom:25px
}
.flower{
font-size:70px;
margin:20px 0;
cursor:pointer
}
#count{
font-size:18px;
color:#c0392b;
margin:20px 0
}
button{
background:#27ae60;
color:white;
border:none;
padding:12px 30px;
border-radius:10px;
font-size:16px;
cursor:pointer;
width:80%
}
</style>
</head>

<body>
<div class="card">
<h1>清明寄思 · 云端献花</h1>
<p class="text">缅怀先烈，文明祭扫</p>

<div class="flower" onclick="add()">🌸</div>
<p>点击鲜花献花</p>

<div id="count">正在获取献花数...</div>
<button onclick="add()">我也献花</button>
</div>

<script>
// 后端接口（我给你提供公共免费接口，所有人共用）
const API = "https://api.kvdb.io/keys/qingming-flower-2025";

// 页面打开时自动获取最新数量
async function getCount() {
  let res = await fetch(API);
  let data = await res.json();
  let num = data.value || 0;
  document.getElementById("count").innerText = `已有 ${num} 人献花`;
}

// 点击献花 +1
async function add() {
  let res = await fetch(API);
  let data = await res.json();
  let newCount = (data.value || 0) + 1;

  await fetch(API, {
    method: "PUT",
    body: newCount
  });

  getCount();
  alert("献花成功！");
}

// 初始化
getCount();
</script>
</body>
</html>
